<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Dapa</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --color1: #ff4d4d; /* Merah cerah */
            --color2: #ff99cc; /* Pink muda */
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Fredoka One', cursive; /* Font super imut */
            overflow: hidden;
            animation: changeBG 3s infinite alternate; /* Animasi background */
            position: relative;
        }

        /* Animasi ganti background Merah <-> Pink */
        @keyframes changeBG {
            0% { background-color: var(--color1); }
            100% { background-color: var(--color2); }
        }

        /* Kontainer Utama */
        .card {
            background-color: rgba(255, 255, 255, 0.8);
            color: #b30000; /* Warna teks */
            text-align: center;
            position: relative;
            padding: 50px;
            
            /* Border Bentuk Kucing :) */
            border: 10px solid #fff;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.1);
            
            /* Triki Border Kucing dengan CSS mask */
            /* Ini agak susah di CSS biasa, jadi kita pakai border-radius ekstrem */
            /* & gambar bayangan kucing di belakang untuk efeknya */
            border-radius: 100px 100px 30px 30px;
            position: relative;
            z-index: 10;
        }
        
        /* Telinga Kucing Kiri */
        .card::before {
            content: '';
            position: absolute;
            top: -50px; left: 30px;
            width: 0; height: 0;
            border-left: 50px solid transparent;
            border-right: 50px solid transparent;
            border-bottom: 70px solid #fff; /* Sama dengan warna border */
            z-index: -1;
        }

        /* Telinga Kucing Kanan */
        .card::after {
            content: '';
            position: absolute;
            top: -50px; right: 30px;
            width: 0; height: 0;
            border-left: 50px solid transparent;
            border-right: 50px solid transparent;
            border-bottom: 70px solid #fff; /* Sama dengan warna border */
            z-index: -1;
        }

        .title {
            font-size: 3rem;
            margin: 0;
            text-shadow: 2px 2px 0px #fff;
        }

        .subtitle {
            font-size: 1.2rem;
            margin-top: 10px;
            font-weight: bold;
        }

        /* Elemen Rame yang Bertebaran (Tinggal Pilih Emotnya) */
        .floating-icon {
            position: absolute;
            opacity: 0.8;
            user-select: none;
            z-index: 1;
        }

        /* Animasi permen/susu bergerak membentuk LOVE */
        @keyframes formHeart {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .love-element {
            position: absolute;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            width: 150px;
            height: 150px;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            animation: formHeart 2s infinite alternate;
            z-index: 5;
        }

        .love-element span {
            font-size: 20px;
            margin: 2px;
        }

    </style>
</head>
<body>

    <div class="card">
        <h1 class="title">dapa bocilllll mungillll</h1>
        <p class="subtitle">  bocilll bauuu pesinggg😝😜🤪</p>
    </div>

    <div class="love-element">
        <span>🍬</span><span>🍼</span><span>🍭</span>
        <span>🍼</span><span>❤️</span><span>🍬</span>
        <span>🍭</span><span>🍼</span><span>🍬</span>
        <span>🍬</span><span>🍭</span>
    </div>

    <script>
        // Array emoji rame (permen, susu, kucing, emot imut)
        const icons = ['🍭', '🍬', '🍼', '🍼', '🐱', '✨', '💖', '⭐', '🐶', '🍕', '🥛'];

        // Fungsi untuk membuat elemen bertebaran
        function createFloatingIcon() {
            const icon = document.createElement('div');
            icon.classList.add('floating-icon');
            
            // Pilih emoji acak
            icon.innerText = icons[Math.floor(Math.random() * icons.length)];
            
            // Posisi, ukuran, dan durasi acak
            icon.style.left = Math.random() * 100 + 'vw';
            icon.style.top = Math.random() * 100 + 'vh';
            icon.style.fontSize = Math.random() * 20 + 20 + 'px';
            icon.style.animation = `floatAround ${Math.random() * 5 + 3}s linear infinite`;

            document.body.appendChild(icon);

            // Ganti posisi acak setiap 5 detik
            setInterval(() => {
                icon.style.left = Math.random() * 100 + 'vw';
                icon.style.top = Math.random() * 100 + 'vh';
            }, Math.random() * 3000 + 2000);
        }

        // Tampilkan 40 elemen bertebaran
        for (let i = 0; i < 40; i++) {
            createFloatingIcon();
        }
    </script>
</body>
</html>
