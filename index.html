<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Sayangku</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fce4ec; /* Warna pink lembut */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: #d81b60;
        }

        .container {
            text-align: center;
            z-index: 1;
            background: rgba(255, 255, 255, 0.8);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 2px solid #f8bbd0;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
        }

        /* Animasi Hati Berterbangan */
        .heart {
            position: absolute;
            color: #ff4081;
            font-size: 20px;
            user-select: none;
            animation: move Up 4s linear infinite;
            opacity: 0;
        }

        @keyframes moveUp {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Halo, [Nama Pacarmu]! ❤️</h1>
        <p>Hanya ingin bilang kalau aku sayang kamu!</p>
    </div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            
            // Posisi horizontal acak
            heart.style.left = Math.random() * 100 + "vw";
            
            // Ukuran acak
            heart.style.fontSize = Math.random() * 20 + 10 + "px";
            
            // Durasi animasi acak agar alami
            heart.style.animationDuration = Math.random() * 3 + 2 + "s";
            
            document.body.appendChild(heart);

            // Hapus elemen setelah animasi selesai agar tidak berat
            setTimeout(() => {
                heart.remove();
            }, 4000);
        }

        // Membuat hati setiap 300 milidetik
        setInterval(createHeart, 300);
    </script>
</body>
</html>
